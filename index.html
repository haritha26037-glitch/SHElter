<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SHElter | Safety Intelligence OS — India Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC3EEbj75sIVbQSWohTuIl4KIMynG01EQA&libraries=places,geometry,visualization"></script>
    <style>
        :root {
            --bg-body:       #F0F4F9;
            --bg-sidebar:    #FFFFFF;
            --bg-card:       #FFFFFF;
            --bg-card-hover: #F5F8FF;
            --bg-panel:      #FFFFFF;
            --border:        #E4EAF2;
            --border-mid:    #C8D6E8;
            --accent:        #1A6FE8;
            --accent-light:  #EBF2FF;
            --accent-mid:    #4A8FF0;
            --accent-soft:   rgba(26,111,232,0.08);
            --danger:        #E8364A;
            --danger-light:  #FFF0F2;
            --danger-mid:    rgba(232,54,74,0.15);
            --warning:       #F59E0B;
            --warning-light: #FFFBEB;
            --success:       #0BA360;
            --success-light: #EDFAF4;
            --text-primary:  #0F1C2E;
            --text-secondary:#4A6080;
            --text-muted:    #8FA3BE;
            --text-label:    #6B82A0;
            --shadow-sm:     0 1px 3px rgba(15,28,46,0.06), 0 1px 2px rgba(15,28,46,0.04);
            --shadow-md:     0 4px 16px rgba(15,28,46,0.08), 0 1px 4px rgba(15,28,46,0.05);
            --shadow-lg:     0 12px 40px rgba(15,28,46,0.12);
            --font-ui:       'IBM Plex Sans', sans-serif;
            --font-mono:     'IBM Plex Mono', monospace;
            --font-display:  'Space Grotesk', sans-serif;
            --sidebar-w:     256px;
            --radius:        10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            background: var(--bg-body);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .shelter-dashboard {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ─── SIDEBAR ─── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .logo-container {
            padding: 22px 20px 18px;
            border-bottom: 1px solid var(--border);
        }

        .logo-mark {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo-shield {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--accent) 0%, #0A50C0 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white;
            font-size: 17px;
            box-shadow: 0 4px 12px rgba(26,111,232,0.35);
            flex-shrink: 0;
        }

        .logo-text h2 {
            font-family: var(--font-display);
            font-size: 19px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .logo-text h2 span { color: var(--accent); }

        .logo-sub {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .system-status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: var(--success-light);
            border-radius: 20px;
            border: 1px solid rgba(11,163,96,0.2);
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 0 2px rgba(11,163,96,0.25);
            animation: blink-slow 2.5s infinite;
        }

        @keyframes blink-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .status-text {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--success);
            font-weight: 600;
            letter-spacing: 0.8px;
        }

        .nav-menu {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .nav-section-label {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 8px 6px;
            display: block;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            margin-bottom: 2px;
            position: relative;
        }

        .nav-item i {
            width: 16px;
            font-size: 13px;
            text-align: center;
            flex-shrink: 0;
        }

        .nav-item:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .nav-item.active {
            background: var(--accent-light);
            color: var(--accent);
            border-color: rgba(26,111,232,0.15);
            font-weight: 600;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0; top: 22%; bottom: 22%;
            width: 3px;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
        }

        /* ── Caution badge on Live Alerts nav ── */
        .nav-caution {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .caution-icon {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .caution-icon svg {
            width: 20px; height: 20px;
            animation: caution-flash 1.1s ease-in-out infinite;
            filter: drop-shadow(0 0 4px rgba(232,54,74,0.6));
        }

        @keyframes caution-flash {
            0%   { opacity: 1;    transform: scale(1);    filter: drop-shadow(0 0 4px rgba(232,54,74,0.7)); }
            40%  { opacity: 0.25; transform: scale(0.92); filter: drop-shadow(0 0 0px rgba(232,54,74,0)); }
            100% { opacity: 1;    transform: scale(1);    filter: drop-shadow(0 0 4px rgba(232,54,74,0.7)); }
        }

        .alert-count-badge {
            background: var(--danger);
            color: white;
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            line-height: 14px;
        }

        .sidebar-footer {
            padding: 14px 18px;
            border-top: 1px solid var(--border);
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #0A50C0);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
            border: 2px solid var(--accent-light);
        }

        .admin-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
        .admin-role { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.5px; }

        /* ─── MAIN CONTENT ─── */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .main-content::-webkit-scrollbar { width: 5px; }
        .main-content::-webkit-scrollbar-track { background: transparent; }
        .main-content::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

        /* ─── TOP BAR ─── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 22px;
        }

        .page-title-block h1 {
            font-family: var(--font-display);
            font-size: 21px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .page-title-block h1 i {
            color: var(--accent);
            font-size: 17px;
        }

        .page-breadcrumb {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.8px;
        }

        .clock-block { text-align: right; }

        #realtimeClock {
            font-family: var(--font-mono);
            font-size: 20px;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .clock-date {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ─── STAT CARDS ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 22px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: var(--card-line, var(--accent));
            border-radius: 0 0 var(--radius) var(--radius);
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-card:hover::after { opacity: 1; }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .stat-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-label);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .stat-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 34px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
            color: var(--card-color, var(--text-primary));
        }

        .stat-meta {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        /* Card variants */
        .card-danger  { --card-line: var(--danger);  --card-color: var(--danger); }
        .card-danger  .stat-icon { background: var(--danger-light); color: var(--danger); }

        .card-warning { --card-line: var(--warning); --card-color: var(--warning); }
        .card-warning .stat-icon { background: var(--warning-light); color: var(--warning); }

        .card-accent  { --card-line: var(--accent);  --card-color: var(--accent); }
        .card-accent  .stat-icon { background: var(--accent-light); color: var(--accent); }

        .card-success { --card-line: var(--success); --card-color: var(--success); }
        .card-success .stat-icon { background: var(--success-light); color: var(--success); }

        /* ─── PANELS ─── */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 18px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 20px;
            border-bottom: 1px solid var(--border);
            background: #FAFCFF;
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .panel-title i { color: var(--accent); font-size: 12px; }

        .panel-body { padding: 16px 20px; }

        /* ─── LIVE ALERT BANNER ─── */
        .live-alert-banner {
            display: flex;
            align-items: center;
            gap: 14px;
            background: linear-gradient(135deg, #FFF0F2 0%, #FFF5F0 100%);
            border: 1.5px solid rgba(232,54,74,0.25);
            border-radius: var(--radius);
            padding: 12px 18px;
            margin-bottom: 18px;
            box-shadow: 0 2px 12px rgba(232,54,74,0.08);
        }

        .caution-symbol-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Outer pulse ring */
        .caution-symbol-wrap::before {
            content: '';
            position: absolute;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(232,54,74,0.12);
            animation: pulse-ring 1.6s ease-out infinite;
        }

        .caution-symbol-wrap::after {
            content: '';
            position: absolute;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(232,54,74,0.08);
            animation: pulse-ring 1.6s ease-out infinite 0.4s;
        }

        @keyframes pulse-ring {
            0%   { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .caution-triangle {
            position: relative;
            z-index: 2;
            animation: triangle-pulse 1.1s ease-in-out infinite;
        }

        .caution-triangle svg {
            width: 32px; height: 32px;
            filter: drop-shadow(0 2px 6px rgba(232,54,74,0.5));
        }

        @keyframes triangle-pulse {
            0%   { transform: scale(1);    opacity: 1; }
            45%  { transform: scale(0.88); opacity: 0.3; }
            100% { transform: scale(1);    opacity: 1; }
        }

        .live-alert-text strong {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--danger);
            letter-spacing: 0.3px;
        }

        .live-alert-text span {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #B03040;
            letter-spacing: 0.5px;
        }

        .live-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--danger);
            color: white;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(232,54,74,0.35);
        }

        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: white;
            animation: blink-slow 0.9s infinite;
        }

        /* ─── MAP ─── */
        #map {
            height: 360px;
            width: 100%;
        }

        /* ─── FILTER BUTTONS ─── */
        .filter-group { display: flex; gap: 6px; }

        .filter-btn {
            padding: 5px 13px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            transition: all 0.15s ease;
        }

        .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        .filter-btn.active {
            background: var(--accent-light);
            border-color: rgba(26,111,232,0.3);
            color: var(--accent);
            font-weight: 600;
        }

        /* ─── TABLE ─── */
        .data-table { width: 100%; border-collapse: collapse; }

        .data-table thead tr { border-bottom: 1.5px solid var(--border); }

        .data-table th {
            text-align: left;
            padding: 10px 14px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-label);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
            background: #FAFCFF;
        }

        .data-table td {
            padding: 12px 14px;
            border-bottom: 1px solid #F0F4FA;
            font-size: 13px;
            color: var(--text-secondary);
            vertical-align: middle;
        }

        .data-table tbody tr { transition: background 0.1s; }
        .data-table tbody tr:hover { background: #F7FAFF; }
        .data-table tbody tr:last-child td { border-bottom: none; }

        .user-cell strong { display: block; color: var(--text-primary); font-size: 13px; font-weight: 600; }
        .user-id { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }

        /* ─── BADGES ─── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 9px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            border: 1px solid;
        }

        .badge-dot { width: 5px; height: 5px; border-radius: 50%; }

        .badge-danger  { background: var(--danger-light); color: var(--danger); border-color: rgba(232,54,74,0.2); }
        .badge-danger  .badge-dot { background: var(--danger); }

        .badge-warning { background: var(--warning-light); color: #B45309; border-color: rgba(245,158,11,0.25); }
        .badge-warning .badge-dot { background: var(--warning); }

        .badge-success { background: var(--success-light); color: var(--success); border-color: rgba(11,163,96,0.2); }
        .badge-success .badge-dot { background: var(--success); }

        .badge-accent  { background: var(--accent-light); color: var(--accent); border-color: rgba(26,111,232,0.2); }
        .badge-accent  .badge-dot { background: var(--accent); }

        /* Status pills */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: capitalize;
        }

        .status-led { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .led-red    { background: var(--danger); box-shadow: 0 0 5px rgba(232,54,74,0.5); animation: blink-slow 1.2s infinite; }
        .led-yellow { background: var(--warning); }
        .led-green  { background: var(--success); }
        .led-blue   { background: var(--accent); }

        /* ─── BUTTONS ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 7px;
            border: 1px solid;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.15s ease;
            background: transparent;
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 2px 8px rgba(26,111,232,0.3);
        }
        .btn-primary:hover { background: #1560CC; box-shadow: 0 4px 14px rgba(26,111,232,0.4); transform: translateY(-1px); }

        .btn-danger  { border-color: rgba(232,54,74,0.35); color: var(--danger); background: var(--danger-light); }
        .btn-danger:hover { background: #FFE0E4; border-color: var(--danger); }

        .btn-success { border-color: rgba(11,163,96,0.3); color: var(--success); background: var(--success-light); }
        .btn-success:hover { background: #D4F7EC; border-color: var(--success); }

        .btn-secondary { border-color: var(--border); color: var(--text-secondary); background: white; }
        .btn-secondary:hover { border-color: var(--border-mid); color: var(--text-primary); background: var(--bg-body); }

        /* ─── PROGRESS ─── */
        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            width: 70px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }

        .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
        .fill-accent   { background: linear-gradient(90deg, var(--accent-mid), var(--accent)); }
        .fill-danger   { background: linear-gradient(90deg, #F06070, var(--danger)); }
        .fill-success  { background: linear-gradient(90deg, #20C070, var(--success)); }

        /* ─── MODAL ─── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10,20,40,0.45);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            border: 1px solid var(--border-mid);
            border-radius: 14px;
            padding: 28px;
            max-width: 560px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            scrollbar-width: thin;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1.5px solid var(--border);
        }

        .modal-title {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .modal-close {
            width: 28px; height: 28px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            transition: all 0.15s;
        }
        .modal-close:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }

        .modal-field {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding: 9px 0;
            border-bottom: 1px solid #F0F4FA;
        }

        .field-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 130px;
            flex-shrink: 0;
        }

        .field-value { font-size: 13px; color: var(--text-primary); }

        .intel-block {
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            margin: 14px 0;
        }

        .intel-header {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-label);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .intel-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .intel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            font-size: 12px;
        }

        .intel-key { color: var(--text-muted); font-family: var(--font-mono); font-size: 10px; }
        .intel-val { color: var(--text-primary); font-weight: 500; }

        .motion-graph { display: flex; gap: 4px; height: 50px; align-items: flex-end; margin-top: 8px; }
        .motion-bar { flex: 1; border-radius: 3px 3px 0 0; transition: all 0.3s ease; }

        .confidence-display { display: flex; align-items: center; gap: 14px; padding: 12px 0; }
        .confidence-num { font-family: var(--font-display); font-size: 44px; font-weight: 700; line-height: 1; }
        .confidence-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }

        /* ─── TOAST ─── */
        .toast-notification {
            position: fixed;
            bottom: 26px;
            right: 26px;
            background: white;
            border: 1px solid var(--border-mid);
            color: var(--text-primary);
            padding: 11px 18px;
            border-radius: 10px;
            z-index: 2000;
            animation: slideInToast 0.25s ease;
            display: none;
            align-items: center;
            gap: 10px;
            font-family: var(--font-mono);
            font-size: 11px;
            box-shadow: var(--shadow-md);
        }

        @keyframes slideInToast {
            from { transform: translateX(16px); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        /* ─── SETTINGS ─── */
        .settings-group { margin-bottom: 18px; }

        .settings-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-label);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 7px;
            display: block;
        }

        .settings-input {
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 8px 12px;
            width: 100%;
            transition: border-color 0.15s;
        }

        .settings-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

        .settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .audit-entry {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #F0F4FA;
            font-size: 12px;
        }

        .audit-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; }
        .audit-action { color: var(--accent); font-weight: 600; }
        .audit-detail { color: var(--text-secondary); }

        .chart-container { padding: 16px 20px 20px; }

        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="shelter-dashboard">

<div id="alertModal" class="modal">

<!-- ─── TOAST ─── -->
<div id="toast" class="toast-notification">
    <i class="fas fa-check-circle" style="color:var(--success);"></i>
    <span id="toastMsg"></span>
</div>

<script>
    let alertsData = [];
    let auditLog = [];
    let systemSettings = { cooldownSeconds: 30, autoEscalateThreshold: 85, motionSensitivity: 'High', audioAnalysis: true };
    let currentFilter = 'all';
    let currentMapFilter = 'all';
    let selectedAlertId = null;
    let map = null;
    let markers = [];

    const indianLocations = [
        { city: "Mumbai",    lat: 19.0760, lng: 72.8777, state: "Maharashtra" },
        { city: "Delhi",     lat: 28.6139, lng: 77.2090, state: "Delhi" },
        { city: "Bengaluru", lat: 12.9716, lng: 77.5946, state: "Karnataka" },
        { city: "Kolkata",   lat: 22.5726, lng: 88.3639, state: "West Bengal" },
        { city: "Chennai",   lat: 13.0827, lng: 80.2707, state: "Tamil Nadu" },
        { city: "Hyderabad", lat: 17.3850, lng: 78.4867, state: "Telangana" },
        { city: "Pune",      lat: 18.5204, lng: 73.8567, state: "Maharashtra" },
        { city: "Ahmedabad", lat: 23.0225, lng: 72.5714, state: "Gujarat" },
        { city: "Jaipur",    lat: 26.9124, lng: 75.7873, state: "Rajasthan" },
        { city: "Lucknow",   lat: 26.8467, lng: 80.9462, state: "Uttar Pradesh" }
    ];

    const userNames = [
        "Priya Sharma","Anjali Verma","Neha Gupta","Divya Reddy","Kavita Singh",
        "Riya Patel","Meera Nair","Sneha Joshi","Pooja Malhotra","Iyer Lakshmi",
        "Ananya Das","Shreya Kapoor","Tanya Mehta","Swati Choudhury","Rashmi Kaur"
    ];

    function generateAlerts() {
        const alerts = [];
        const now = new Date();
        for (let i = 1; i <= 24; i++) {
            const loc = indianLocations[Math.floor(Math.random() * indianLocations.length)];
            const confidence = Math.floor(Math.random() * 100);
            const risk = confidence >= 80 ? 'low' : confidence >= 50 ? 'moderate' : 'high';
            const statuses = ['active','analyzing','resolved','escalated'];
            const ts = new Date(now - Math.random() * 48 * 60 * 60000);
            const motionData = Array(7).fill().map(() => Math.floor(Math.random() * 100));
            alerts.push({
                id: i,
                userId: `SHE-${String(1000+i).slice(1)}`,
                userName: userNames[(i-1) % userNames.length],
                city: loc.city, state: loc.state,
                lat: loc.lat + (Math.random()-0.5)*0.05,
                lng: loc.lng + (Math.random()-0.5)*0.05,
                confidence, risk,
                status: statuses[Math.floor(Math.random() * statuses.length)],
                timestamp: ts,
                audioAnalysis: confidence > 70 ? "Distress scream detected" : confidence > 50 ? "Unclear audio pattern" : "No distress detected",
                motionPeak: Math.max(...motionData),
                motionData,
                historyFlags: Math.floor(Math.random() * 8),
                responseTime: Math.floor(Math.random() * 180),
                isFake: confidence < 40
            });
        }
        return alerts.sort((a,b) => b.timestamp - a.timestamp);
    }

    function generateUsers() {
        const users = [];
        const unique = [...new Map(alertsData.map(a => [a.userId, a])).values()];
        unique.forEach(alert => {
            const ua = alertsData.filter(a => a.userId === alert.userId);
            const avg = ua.reduce((s,a) => s+a.confidence, 0) / ua.length;
            const fc = ua.filter(a => a.confidence < 50).length;
            const trust = Math.max(0, Math.min(100, Math.floor(avg - fc*7)));
            users.push({
                userId: alert.userId, userName: alert.userName,
                phone: `+91 ${Math.floor(9000000000 + Math.random()*1000000000)}`,
                city: alert.city, trustScore: trust,
                alertCount: ua.length, falseAlertCount: fc,
                flagStatus: trust < 40 ? "Flagged" : trust < 70 ? "Under Review" : "Normal",
                cooldownRemaining: trust < 50 ? Math.floor(Math.random()*30) : 0
            });
        });
        return users;
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        t.style.display = 'flex';
        setTimeout(() => { t.style.display = 'none'; }, 3200);
    }

    function getRiskColor(confidence) {
        if (confidence >= 80) return { cls: 'badge-success', label: 'Verified' };
        if (confidence >= 50) return { cls: 'badge-warning', label: 'Moderate' };
        return { cls: 'badge-danger', label: 'Suspicious' };
    }

    function calculateTrustScore(userId) {
        const ua = alertsData.filter(a => a.userId === userId);
        if (!ua.length) return 100;
        const avg = ua.reduce((s,a) => s+a.confidence, 0) / ua.length;
        const fc = ua.filter(a => a.confidence < 50).length;
        return Math.max(0, Math.min(100, Math.floor(avg - fc*8)));
    }

    function logAction(action, details) {
        auditLog.unshift({ timestamp: new Date(), action, details });
        if (auditLog.length > 100) auditLog.pop();
    }

    function escalateAlert(alertId) {
        const a = alertsData.find(x => x.id === alertId);
        if (a) {
            a.status = 'escalated';
            logAction('Alert Escalated', `#${alertId} – ${a.userName} escalated to emergency services`);
            showToast(`🚨 Alert #${alertId} escalated to emergency services`);
            renderCurrentPage();
        }
    }

    function markSafe(alertId) {
        const a = alertsData.find(x => x.id === alertId);
        if (a) {
            a.status = 'resolved';
            logAction('Marked Safe', `#${alertId} – ${a.userName} resolved by admin`);
            showToast(`✅ Alert #${alertId} marked as safe`);
            renderCurrentPage();
        }
    }

    function viewAlertDetails(alertId) {
        selectedAlertId = alertId;
        const a = alertsData.find(x => x.id === alertId);
        if (!a) return;
        const risk = getRiskColor(a.confidence);
        const trust = calculateTrustScore(a.userId);
        const confColor = a.confidence >= 80 ? 'var(--success)' : a.confidence >= 50 ? 'var(--warning)' : 'var(--danger)';

        document.getElementById('modalContent').innerHTML = `
            <div class="modal-field">
                <span class="field-label">User</span>
                <span class="field-value"><strong>${a.userName}</strong> <span class="user-id">${a.userId}</span></span>
            </div>
            <div class="modal-field">
                <span class="field-label">Location</span>
                <span class="field-value">${a.city}, ${a.state}</span>
            </div>
            <div class="modal-field">
                <span class="field-label">Timestamp</span>
                <span class="field-value" style="font-family:var(--font-mono);font-size:12px;">${moment(a.timestamp).format('DD MMM YYYY · HH:mm:ss')}</span>
            </div>
            <div class="modal-field">
                <span class="field-label">Status</span>
                <span class="field-value"><span class="badge ${risk.cls}"><span class="badge-dot"></span>${risk.label}</span></span>
            </div>
            <div class="confidence-display" style="margin:12px 0 4px;">
                <div>
                    <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">Confidence Score</div>
                    <div class="confidence-num" style="color:${confColor};">${a.confidence}<span style="font-size:18px;opacity:0.45;">%</span></div>
                </div>
                <div style="flex:1;">
                    <div class="confidence-bar-wrap">
                        <div style="height:100%;width:${a.confidence}%;background:${confColor};border-radius:3px;transition:width 0.5s;"></div>
                    </div>
                    <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:6px;">
                        Fake Alert Probability: <span style="color:${confColor};font-weight:600;">${a.confidence<50?'HIGH':a.confidence<80?'MEDIUM':'LOW'}</span>
                    </div>
                </div>
            </div>
            <div class="intel-block">
                <div class="intel-header"><i class="fas fa-brain" style="color:var(--accent);"></i> Risk Intelligence</div>
                <div class="intel-row"><span class="intel-key">Alert Frequency (30d)</span><span class="intel-val">${alertsData.filter(x=>x.userId===a.userId).length} alerts</span></div>
                <div class="intel-row"><span class="intel-key">Historical Flags</span><span class="intel-val">${a.historyFlags} suspicious flags</span></div>
                <div class="intel-row"><span class="intel-key">Peak Motion Intensity</span><span class="intel-val">${a.motionPeak}% ${a.motionPeak>80?'⚠ Critical':'— Normal'}</span></div>
                <div class="intel-row"><span class="intel-key">Audio Analysis</span><span class="intel-val">${a.audioAnalysis}</span></div>
                <div class="intel-row"><span class="intel-key">Trust Score</span><span class="intel-val">${trust}/100</span></div>
            </div>
            <div style="margin-top:4px;">
                <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-label);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">Motion Activity — Last 7 Seconds</div>
                <div class="motion-graph">
                    ${a.motionData.map(v=>`<div class="motion-bar" style="height:${Math.max(4,v*0.48)}px;background:${v>70?'var(--danger)':v>40?'var(--warning)':'var(--accent)'};opacity:${0.45+v/180};"></div>`).join('')}
                </div>
            </div>
            <button class="btn btn-secondary" style="margin-top:14px;width:100%;justify-content:center;" onclick="simulateAudio(${a.id})">
                <i class="fas fa-headphones"></i> Play Audio Snippet (5s simulation)
            </button>
        `;
        document.getElementById('alertModal').style.display = 'flex';
        if (a.confidence >= 80) { playDistressAudio(a.id, a.confidence, a.userName); }
        document.getElementById('escalateModalBtn').onclick = () => { escalateAlert(alertId); closeModal(); };
        document.getElementById('markSafeModalBtn').onclick  = () => { markSafe(alertId); closeModal(); };
    }

    function simulateAudio(alertId) {
        const a = alertsData.find(x => x.id === alertId);
        if (a.confidence > 70) showToast(`🔊 "HELP! Someone is chasing me!" — distress detected`);
        else if (a.confidence > 50) showToast(`🔊 Unclear audio — possible distress, background noise`);
        else showToast(`🔊 No distress indicators — probable false alarm`);
        logAction('Audio Simulation', `Alert #${alertId}, confidence: ${a.confidence}%`);
    }

    function closeModal() { document.getElementById('alertModal').style.display = 'none'; selectedAlertId = null; }

    /* ── MAP (light theme) ── */
    function initMap() {
        if (!document.getElementById('map')) return;
        map = new google.maps.Map(document.getElementById('map'), {
            zoom: 5,
            center: { lat: 20.5937, lng: 78.9629 },
            mapTypeId: 'roadmap',
            styles: [
                { featureType: "poi",    elementType: "labels",  stylers: [{ visibility: "off" }] },
                { featureType: "transit",elementType: "labels",  stylers: [{ visibility: "off" }] },
                { featureType: "road",   elementType: "labels.icon", stylers: [{ visibility: "off" }] },
                { elementType: "geometry", stylers: [{ saturation: -20 }] },
                { featureType: "water",  elementType: "geometry", stylers: [{ color: "#C5DCF5" }] },
                { featureType: "landscape", elementType: "geometry", stylers: [{ color: "#F5F7FA" }] },
                { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#FFFFFF" }, { weight: 2 }] },
                { featureType: "road",   elementType: "geometry", stylers: [{ color: "#FFFFFF" }] },
                { featureType: "administrative", elementType: "geometry.stroke", stylers: [{ color: "#C8D6E8" }] },
            ],
            mapTypeControl: false,
            streetViewControl: false,
        });
        updateMapMarkers();
    }

    function updateMapMarkers() {
        if (!map) return;
        markers.forEach(m => m.setMap(null));
        markers = [];
        let filtered = alertsData;
        if (currentMapFilter === 'high')   filtered = filtered.filter(a => a.risk === 'high');
        else if (currentMapFilter === 'active') filtered = filtered.filter(a => a.status === 'active');
        else if (currentMapFilter === 'nearby') filtered = filtered.slice(0,8);

        filtered.forEach(alert => {
            const color = alert.confidence >= 80 ? '#0BA360' : alert.confidence >= 50 ? '#F59E0B' : '#E8364A';
            const marker = new google.maps.Marker({
                position: { lat: alert.lat, lng: alert.lng },
                map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: alert.risk === 'high' ? 10 : 8,
                    fillColor: color,
                    fillOpacity: 0.9,
                    strokeWeight: 2,
                    strokeColor: 'white'
                },
                title: `${alert.userName} | ${alert.city} | ${alert.confidence}%`
            });
            marker.addListener('click', () => viewAlertDetails(alert.id));
            markers.push(marker);
            const iw = new google.maps.InfoWindow({
                content: `<div style="padding:10px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:12px;min-width:140px;">
                    <div style="font-weight:700;color:#0F1C2E;margin-bottom:3px;">${alert.userName}</div>
                    <div style="color:#4A6080;">${alert.city}, ${alert.state}</div>
                    <div style="margin-top:5px;font-family:'IBM Plex Mono',monospace;font-size:11px;">
                        <span style="color:#8FA3BE;">Conf:</span> <strong style="color:${color};">${alert.confidence}%</strong>
                        &nbsp;·&nbsp; <span style="color:#8FA3BE;">Status:</span> ${alert.status}
                    </div>
                </div>`
            });
            marker.addListener('mouseover', () => iw.open(map, marker));
            marker.addListener('mouseout',  () => iw.close());
        });
    }

    function setMapFilter(filter) { currentMapFilter = filter; updateMapMarkers(); }

    /* ── DASHBOARD ── */
    function renderDashboard() {
        const activeAlerts = alertsData.filter(a => a.status === 'active').length;
        const highRisk     = alertsData.filter(a => a.risk === 'high' && a.status === 'active').length;
        const avgResp      = Math.floor(alertsData.reduce((s,a) => s+a.responseTime, 0) / alertsData.length);
        const fakeDetected = alertsData.filter(a => a.confidence < 50).length;

        const badge = document.getElementById('alertBadge');
        if (badge) badge.textContent = activeAlerts;

        document.getElementById('mainContent').innerHTML = `
            <div class="top-bar">
                <div class="page-title-block">
                    <h1><i class="fas fa-th-large"></i> Operations Dashboard</h1>
                    <div class="page-breadcrumb">SHElter · India Ops · Real-time Overview</div>
                </div>
                <div class="clock-block">
                    <div id="realtimeClock"></div>
                    <div class="clock-date" id="clockDate"></div>
                </div>
            </div>

            <!-- Live alert banner -->
            ${activeAlerts > 0 ? `
            <div class="live-alert-banner">
                <div class="caution-symbol-wrap">
                    <div class="caution-triangle">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" fill="#E8364A" stroke="#C4173A" stroke-width="1" stroke-linejoin="round"/>

    function updateAlertsTable() {
        let filtered = alertsData;
        if (currentFilter === 'active') filtered = alertsData.filter(a => a.status === 'active');
        if (currentFilter === 'high')   filtered = alertsData.filter(a => a.risk === 'high');
        const tbody = document.getElementById('alertsTableBody');
        if (!tbody) return;
        tbody.innerHTML = filtered.slice(0,12).map(a => {
            if (a.confidence >= 80 && a.status === 'active') {
                setTimeout(() => playDistressAudio(a.id, a.confidence, a.userName), 400);
            }
            const risk = getRiskColor(a.confidence);
            const ledClass = a.status === 'active' ? 'led-red' : a.status === 'resolved' ? 'led-green' : a.status === 'escalated' ? 'led-blue' : 'led-yellow';
            return `<tr>
                <td><div class="user-cell"><strong>${a.userName}</strong><div class="user-id">${a.userId}</div></div></td>
                <td style="color:var(--text-primary);font-weight:500;">${a.city}</td>

                    </div>
                </td>
                <td><span class="badge ${risk.cls}"><span class="badge-dot"></span>${risk.label}</span></td>

        update();
        setInterval(update, 1000);

    /* ── DISTRESS AUDIO PLAYBACK ── */
    function playDistressAudio(alertId, confidence, userName) {
        if (confidence < 80) return;
        const audio = document.getElementById('distressAudio');
        if (!audio) return;
        audio.currentTime = 0;
        const p = audio.play();
        if (p !== undefined) {
            p.then(() => showAudioAlert(userName, confidence, false))
             .catch(() => showAudioAlert(userName, confidence, true));
        }
    }

    function showAudioAlert(userName, confidence, blocked) {
        const existing = document.getElementById('audioAlertToast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.id = 'audioAlertToast';
        toast.style.cssText = [
            'position:fixed','top:24px','right:24px','z-index:3000',
            'background:white','border:1.5px solid rgba(232,54,74,0.3)',
            'border-radius:12px','padding:14px 18px',
            'box-shadow:0 8px 30px rgba(232,54,74,0.15),0 2px 8px rgba(0,0,0,0.08)',
            'display:flex','align-items:center','gap:12px',
            'min-width:300px','max-width:380px',
            "animation:slideInFromRight 0.35s cubic-bezier(0.34,1.56,0.64,1)",
            "font-family:'IBM Plex Sans',sans-serif"
        ].join(';');

        const icon = blocked ? 'fa-volume-mute' : 'fa-volume-up';
        const title = blocked ? '⚠ Distress Signal Detected' : '🔊 Distress Audio Playing';
        const sub = blocked ? '<div style="font-size:10px;color:#8FA3BE;margin-top:3px;font-family:IBM Plex Mono,monospace;">Click anywhere to enable audio</div>' : '';

        toast.innerHTML = `
            <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#FFF0F2,#FFE0E4);border:1.5px solid rgba(232,54,74,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;">
                <i class="fas ${icon}" style="color:#E8364A;font-size:15px;"></i>
                <div style="position:absolute;top:-4px;right:-4px;width:10px;height:10px;border-radius:50%;background:#E8364A;box-shadow:0 0 0 2px white;animation:blink-slow 0.8s infinite;"></div>
            </div>
            <div style="flex:1;min-width:0;">
                <div style="font-size:12px;font-weight:700;color:#0F1C2E;margin-bottom:2px;">${title}</div>
                <div style="font-size:11px;color:#4A6080;font-family:'IBM Plex Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${userName} · Confidence: ${confidence}%</div>
                ${sub}
            </div>
            <button onclick="this.parentElement.remove();document.getElementById('distressAudio')?.pause();"
                style="width:24px;height:24px;border-radius:6px;border:1px solid #E4EAF2;background:white;color:#8FA3BE;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;"
                onmouseover="this.style.borderColor='#E8364A';this.style.color='#E8364A';"
                onmouseout="this.style.borderColor='#E4EAF2';this.style.color='#8FA3BE';">
                <i class="fas fa-times"></i>
            </button>
        `;

        if (!document.getElementById('audioToastStyle')) {
            const s = document.createElement('style');
            s.id = 'audioToastStyle';
            s.textContent = '@keyframes slideInFromRight{from{transform:translateX(30px) scale(0.95);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}';
            document.head.appendChild(s);
        }
        document.body.appendChild(toast);
        setTimeout(() => {
            if (toast.parentElement) {
                toast.style.transition = 'opacity 0.4s ease,transform 0.4s ease';
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(10px)';
                setTimeout(() => toast.remove(), 400);
            }
        }, 6000);
    }

    alertsData = generateAlerts();
    renderDashboard();
</script>
